<!DOCTYPE html>
<html>
<head>
    <title>Touchless Canteen Billing</title>

    <style>

        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
            padding: 40px;
        }

        h1 {
            color: #333;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            background: green;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background: darkgreen;
        }

        .result {
            margin-top: 20px;
            text-align: left;
        }

    </style>
</head>

<body>

    <h1>Touchless Canteen Billing System</h1>

    <div class="box">

        <form action="/predict" method="POST" enctype="multipart/form-data">

            <input type="file" name="file" multiple required>

            <br><br>

            <button type="submit">Generate Bill</button>

        </form>

        {% if items %}

        <div class="result">

            <h2>Detected Food Items</h2>

            <ul>
                {% for item in items %}
                    <li>{{ item.name }} - ₹{{ item.price }}</li>
                {% endfor %}
            </ul>

            <h2>Total Bill: ₹{{ total }}</h2>

        </div>

        {% endif %}

    </div>

</body>
</html>
